<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试引导</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css">
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            background-color: rgb(255, 255, 255);
            color: black;
        }
        
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
        .next-button {
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="markdown-body" id="content">
        <button class="next-button" type="button" onclick="nextstep()">下一步</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 从GitHub获取Markdown内容
        fetch('https://raw.githubusercontent.com/InfiniteStatesInc/HireWithCode/refs/heads/main/README.md')
            .then(response => response.text())
            .then(text => {
                // 将Markdown转换为HTML
                document.getElementById('content').innerHTML = marked.parse(text) + 
                    '<button type="button" onclick="nextstep()">下一步</button>';
            })
            .catch(error => {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = 
                    '<h1>加载失败</h1><p>无法加载面试引导内容，请稍后再试。</p>'+ 
                    '<button type="button" onclick="nextstep()">下一步</button>';
            });

            function nextstep() {
                window.location.href = "accept.html";
            }
    </script>
</body>
</html>
